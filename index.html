<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeepSeek 助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e9ecef;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            background: white;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 20px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-end;
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            align-self: flex-start;
            background: #e9ecef;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid #e9ecef;
            background: white;
            display: flex;
            gap: 12px;
        }
        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e9ecef;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            background: #f8f9fa;
        }
        #userInput:focus {
            border-color: #007aff;
            background: white;
        }
        #sendBtn {
            background: #007aff;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        #sendBtn:active {
            background: #005fc1;
        }
        .loading {
            text-align: center;
            color: #868e96;
            font-size: 14px;
            padding: 8px;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">DeepSeek 助手</div>
    <div class="messages-area" id="messagesArea">
        <div class="message bot-message">你好！我是 DeepSeek 助手，有什么可以帮你的吗？</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入你的问题..." />
        <button id="sendBtn">发送</button>
    </div>
</div>
<script>
    //deepseek-proxy.3090537649.workers.dev
    const API_ENDPOINT = 'https://deepseek-proxy.你的用户名.workers.dev';

    const messagesArea = document.getElementById('messagesArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(content, isUser) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        messageDiv.textContent = content;
        messagesArea.appendChild(messageDiv);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function setLoading(loading) {
        const existingLoader = document.querySelector('.loading');
        if (loading && !existingLoader) {
            const loader = document.createElement('div');
            loader.className = 'loading';
            loader.id = 'loadingIndicator';
            loader.textContent = 'AI 正在思考...';
            messagesArea.appendChild(loader);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        } else if (!loading && existingLoader) {
            existingLoader.remove();
        }
    }

    async function sendMessage() {
     const userMessage = userInput.value.trim();
        if (!userMessage) return;

        addMessage(userMessage, true);
        userInput.value = '';
        setLoading(true);

        try {
            const response = await fetch(API_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: 'You are a helpful assistant.' },
                        { role: 'user', content: userMessage }
                    ],
                    stream: false
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            if (data.choices && data.choices[0] && data.choices[0].message) {
                addMessage(data.choices[0].message.content, false);
            } else {
                addMessage('抱歉，我没有理解你的问题，请再试一次。', false);
            }
        } catch (error) {
            console.error('API 调用失败:', error);
            addMessage('网络错误，请检查代理地址是否正确或稍后再试。', false);
        } finally {
            setLoading(false);
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
